version: "3.8"

services:


  eurekaserver:
    image: govindkalal/salon-eurekaserver-yt:v1
    container_name: eurekaserver
    ports:
      - "8070:8070"
    restart: always

  gatewayserver:
    image: govindkalal/salon-gatewayserver-yt:v1
    container_name: gatewayserver
    ports:
      - "5000:5000"
    environment:
      SPRING_APPLICATION_NAME: gateway-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: https://eureka-4.onrender.com/eureka/
      SPRING_CLOUD_CLIENT_SERVICEURL_DEFAULTZONE: https://eureka-4.onrender.com/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    depends_on:
      - eurekaserver
    restart: always

  user:
    image: govindkalal/salon-user-yt:v2
    container_name: user
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://yq9eAkzxxvnYuz5.root:ER5KAuU7ycb51i90@gateway01.ap-southeast-1.prod.aws.tidbcloud.com:4000/salon
      SPRING_DATASOURCE_USERNAME: yq9eAkzxxvnYuz5.root
      SPRING_DATASOURCE_PASSWORD: eBuktKaVtCAw3Dhk
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: https://eureka-4.onrender.com/eureka/
    depends_on:
      - eurekaserver
    restart: always

